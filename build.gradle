plugins {
  id 'java'
  id 'org.springframework.boot' version '4.0.1'
  id 'io.spring.dependency-management' version '1.1.7'
  id 'org.openrewrite.rewrite' version '7.30.0'
  id "org.sonarqube" version "7.2.3.7755"
  id 'jacoco'
  id 'com.github.ben-manes.versions' version '0.54.0'
  id 'org.owasp.dependencycheck' version '12.2.1'
}

group = 'navrat.name'
version = '0.0.1-SNAPSHOT'
description = 'Synchronizace transakcí z Moneta na Lezeni'

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(25)
  }
}

configurations {
  compileOnly {
    extendsFrom annotationProcessor
  }
}

repositories {
  mavenLocal()
  mavenCentral()
}

ext {
  set('springCloudVersion', "2025.1.0")
  set('resilience4jVersion', "2.4.0")
}

dependencies {
  implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
  implementation 'org.springframework.boot:spring-boot-starter-kafka'
  implementation 'org.springframework.boot:spring-boot-starter-restclient:4.0.2'
  implementation 'org.springframework.boot:spring-boot-starter-validation'
  implementation 'org.springframework.boot:spring-boot-starter-webmvc'
  implementation 'org.springframework.boot:spring-boot-starter-json'
  implementation 'org.springframework.boot:spring-boot-starter-aspectj'
  implementation 'org.springframework.boot:spring-boot-starter-actuator'

  implementation "io.github.resilience4j:resilience4j-circuitbreaker:${resilience4jVersion}"
  implementation "io.github.resilience4j:resilience4j-ratelimiter:${resilience4jVersion}"
  implementation "io.github.resilience4j:resilience4j-spring-boot4:${resilience4jVersion}"

  //needed by Kafka
  implementation 'com.fasterxml.jackson.core:jackson-databind'
  implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'

  implementation 'org.mapstruct:mapstruct:1.6.3'
  implementation 'tools.jackson.core:jackson-databind'
  implementation 'tools.jackson.core:jackson-databind'
  implementation 'io.github.openfeign.querydsl:querydsl-jpa:7.1'
  compileOnly 'org.projectlombok:lombok'
  runtimeOnly 'org.postgresql:postgresql'
  annotationProcessor 'org.projectlombok:lombok'
  annotationProcessor "org.projectlombok:lombok-mapstruct-binding:0.2.0"
  annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'
  annotationProcessor 'io.github.openfeign.querydsl:querydsl-apt:7.1:jpa'
  annotationProcessor 'jakarta.persistence:jakarta.persistence-api'
  testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
  testImplementation 'org.springframework.boot:spring-boot-starter-kafka-test'
  testImplementation 'org.springframework.boot:spring-boot-starter-validation-test'
  testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
  testImplementation 'com.h2database:h2'
  testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
  rewrite 'org.openrewrite.recipe:rewrite-spring:6.29.2'
  rewrite 'org.openrewrite.recipe:rewrite-static-analysis:2.32.0'
}

dependencyManagement {
  imports {
    mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
  }
}

rewrite {
  activeRecipe(
      'org.openrewrite.java.format.NormalizeTabsOrSpaces',
      'org.openrewrite.java.spring.boot4.UpgradeSpringBoot_4_0',
      'org.openrewrite.staticanalysis.CommonStaticAnalysis'
  )
}

jacoco { toolVersion = "0.8.14" }

jacocoTestReport {
    dependsOn test
    reports { xml.required = true; html.required = true }
}

test.finalizedBy jacocoTestReport

sonar {
  properties {
    property "sonar.host.url", "http://localhost:9000"
    property "sonar.projectKey", "moneta2lezeni"
    property "sonar.projectName", "moneta2lezeni"
    property "sonar.sources", (sourceSets.main.allSource.srcDirs + files("ui-client/src")).join(",")
    property "sonar.tests", sourceSets.test.allSource.srcDirs.join(",")
    property "sonar.java.binaries", sourceSets.main.output.classesDirs.asPath
    property "sonar.exclusions", "**/node_modules/**, **/dist/**, **/build/**, ui-client/eslint.config.js"
    property "sonar.javascript.file.suffixes", ".js,.jsx"
    property "sonar.typescript.file.suffixes", ".ts,.tsx"
    // 4. Volitelně: Cesta k výsledkům testů a pokrytí pro JS (pokud používáte Vitest/Jest)
    // property "sonar.javascript.lcov.reportPaths", "ui-client/coverage/lcov.info"
  }
}

tasks.named('test') {
  useJUnitPlatform()
  systemProperty 'spring.profiles.active', 'test'
}

tasks.withType(Test).configureEach {
  jvmArgs("-XX:+EnableDynamicAgentLoading")
}

// `gradlew dependencyUpdates` — list outdated deps. Reject pre-release versions by default.
tasks.named('dependencyUpdates').configure {
  rejectVersionIf { sel ->
    def s = sel.candidate.version.toLowerCase()
    s.contains('alpha') || s.contains('beta') || s.contains('rc') || s.contains('m1') || s.contains('m2') || s.contains('cr')
  }
}

// `gradlew dependencyCheckAnalyze` — OWASP CVE scan against NVD database.
// Set NVD_API_KEY env var (free at https://nvd.nist.gov/developers/request-an-api-key) to avoid heavy rate-limiting.
dependencyCheck {
  failBuildOnCVSS = 7  // fail build on High+ CVE
  nvd {
    if (System.getenv('NVD_API_KEY')) apiKey = System.getenv('NVD_API_KEY')
  }
  formats = ['HTML', 'JSON']
  suppressionFile = file('config/owasp-suppressions.xml').exists() ? 'config/owasp-suppressions.xml' : null
}
